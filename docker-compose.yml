services:
  cachesec:
    container_name: cachesec
    image: ${CACHESEC_IMAGE:-cachesec:kinect}
    restart: unless-stopped
    ports:
      - "${CACHESEC_BIND_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      PROXY_COUNT: ${CACHESEC_PROXY_COUNT:-0}
      SESSION_COOKIE_SECURE: ${CACHESEC_SESSION_COOKIE_SECURE:-false}
      DATABASE_PATH: /data/cachesec.db
      RECORDINGS_DIR: /data/recordings
      SNAPSHOTS_DIR: /data/snapshots
      UPLOAD_FOLDER: /data/uploads/faces
      LOG_FILE: /data/logs/cachesec.log
      HOME: /data
    volumes:
      - cachesec-data:/data
      # Required for Kinect v1 / OpenKinect USB access.
      # - /dev/bus/usb:/dev/bus/usb
    stop_grace_period: 30s
    # Required for Kinect v1 / OpenKinect USB access.
    # privileged: true
    # Uncomment these if you want direct host hardware access from the container.
    # Set CACHESEC_VIDEO_DEVICE to the host V4L2 node if it is not /dev/video0
    # (common on Raspberry Pi/libcamera systems). The app can keep CAMERA_INDEX=0
    # because the chosen host node is mapped to /dev/video0 inside the container.
    # devices:
    #   - ${CACHESEC_VIDEO_DEVICE:-/dev/video0}:/dev/video0
    #   - ${CACHESEC_GPIO_DEVICE:-/dev/gpiochip0}:/dev/gpiochip0
    #   - /dev/snd:/dev/snd

volumes:
  cachesec-data:

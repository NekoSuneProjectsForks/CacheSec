name: Build Container

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cachesec

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            install_kinect: "false"
            install_detectron2: "false"
            torch_index_url: "https://download.pytorch.org/whl/cpu"
            platforms: linux/amd64,linux/arm64
            metadata_tags: |
              type=raw,value=cpu
              type=raw,value=latest,enable={{is_default_branch}}
              type=ref,event=tag
              type=ref,event=pr
          - variant: pi
            install_kinect: "false"
            install_detectron2: "false"
            torch_index_url: "https://download.pytorch.org/whl/cpu"
            platforms: linux/arm64
            metadata_tags: |
              type=raw,value=pi
          - variant: kinect
            install_kinect: "true"
            install_kinect2: "false"
            install_detectron2: "false"
            torch_index_url: "https://download.pytorch.org/whl/cpu"
            platforms: linux/amd64,linux/arm64
            metadata_tags: |
              type=raw,value=kinect
              type=raw,value=kinect1
          - variant: kinect2
            install_kinect: "false"
            install_kinect2: "true"
            install_detectron2: "false"
            torch_index_url: "https://download.pytorch.org/whl/cpu"
            platforms: linux/amd64,linux/arm64
            metadata_tags: |
              type=raw,value=kinect2
          - variant: detectron2-cpu
            install_kinect: "false"
            install_kinect2: "false"
            install_detectron2: "true"
            torch_index_url: "https://download.pytorch.org/whl/cpu"
            platforms: linux/amd64,linux/arm64
            metadata_tags: |
              type=raw,value=detectron2
              type=raw,value=detectron2-cpu
          - variant: detectron2-cuda11
            install_kinect: "false"
            install_kinect2: "false"
            install_detectron2: "true"
            torch_index_url: "https://download.pytorch.org/whl/cu118"
            platforms: linux/amd64
            metadata_tags: |
              type=raw,value=cuda11
              type=raw,value=detectron2-cuda11
          - variant: detectron2-cuda12
            install_kinect: "false"
            install_kinect2: "false"
            install_detectron2: "true"
            torch_index_url: "https://download.pytorch.org/whl/cu121"
            platforms: linux/amd64
            metadata_tags: |
              type=raw,value=cuda12
              type=raw,value=detectron2-cuda12
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (${{ matrix.variant }})
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: ${{ matrix.metadata_tags }}

      - name: Build and push (${{ matrix.variant }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platforms }}
          build-args: |
            INSTALL_KINECT=${{ matrix.install_kinect }}
            INSTALL_KINECT2=${{ matrix.install_kinect2 || 'false' }}
            INSTALL_DETECTRON2=${{ matrix.install_detectron2 }}
            TORCH_INDEX_URL=${{ matrix.torch_index_url }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
